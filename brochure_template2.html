<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>智慧物流工程师</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: "Microsoft YaHei UI", "PingFang SC", "Helvetica Neue", Helvetica, Arial, sans-serif;
  background: #f0f2f5;
  min-height: 100vh;
  display: flex; justify-content: center; align-items: center;
  padding: 40px;
}

.module-card {
  max-width: 900px;
  background: #fff;
  border: 1px solid #004a88;
  border-radius: 40px;
  padding: 40px 50px;
}

.top-bar {
  display: flex; align-items: center; gap: 20px;
  margin-bottom: 30px; flex-wrap: wrap;
}
.top-badge {
  background: #f96217; color: #fff; border-radius: 100px;
  padding: 8px 24px; font-size: 24px; font-weight: 700;
}
.top-info {
  font-size: 14px; color: #666;
}

/* ====== SVG 连接线 ====== */
.cluster-wrap { position: relative; width: 100%; }
.cluster-wrap svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

/* ====== 集群 ====== */
.cluster {
  position: relative;
  width: 680px; height: 400px;
  margin: 0 auto;
  z-index: 2;
}

/* 中心大圆 */
.center-circle {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 180px; height: 180px;
  border-radius: 50%;
  background: rgba(194, 227, 255, 0.85);
  border: 3px solid #004a88;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 10;
}
.center-circle .circle-title {
  font-size: 20px; font-weight: 700; color: #004a88;
  text-align: center; line-height: 1.4;
}
.center-circle .circle-hours {
  font-size: 14px; font-weight: 600; color: #004a88;
  margin-top: 8px;
  background: #fff; border-radius: 50px; padding: 4px 18px;
}

/* 节点公共 */
.node {
  position: absolute;
  display: flex; align-items: center; gap: 0;
  z-index: 5;
}
.node-circle {
  width: 52px; height: 52px;
  border-radius: 50%;
  background: rgba(194, 227, 255, 0.65);
  border: 2px solid #004a88;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
.node-circle::after {
  content: '';
  width: 18px; height: 18px;
  border-radius: 50%;
  background: #004a88;
}

.node-label {
  background: #fff;
  border-radius: 0 12px 0 12px;
  box-shadow: 0 0 4px rgba(0,0,0,0.1);
  padding: 8px 16px;
  font-size: 13px; line-height: 1.5; color: #3a475b;
  white-space: nowrap;
  position: absolute; top: 50%; transform: translateY(-50%);
  z-index: 4;
}

/* === 节点位置 === */
/* node-1: 顶部 */
.node-1 { left: 232px; top: 5px; flex-direction: column; }
.node-1 .node-label {
  top: auto; bottom: 100%; left: 50%; transform: translateX(-50%);
  margin-bottom: 6px;
  border-radius: 12px 12px 0 12px;
}

/* node-2: 左上 — 标签向左 */
.node-2 { left: 145px; top: 150px; flex-direction: row-reverse; }
.node-2 .node-label {
  right: 100%; margin-right: 6px;
  border-radius: 12px 0 12px 12px;
}

/* node-3: 左下 — 标签向左 */
.node-3 { left: 148px; top: 320px; flex-direction: row-reverse; }
.node-3 .node-label {
  right: 100%; margin-right: 6px;
  border-radius: 12px 0 12px 12px;
}

/* node-4: 右下 — 标签向右 */
.node-4 { left: 320px; top: 320px; }
.node-4 .node-label {
  left: 100%; margin-left: 6px;
}

/* node-5: 右上 — 标签向右 */
.node-5 { left: 323px; top: 150px; }
.node-5 .node-label {
  left: 100%; margin-left: 6px;
}
</style>
</head>
<body>

<div class="module-card">
  <div class="top-bar">
    <span class="top-badge">智慧物流工程师</span>
    <span class="top-info">产业驱动式场景化智慧物流人才培养 &nbsp;|&nbsp; 1000课时 &nbsp;|&nbsp; WMS/TMS模拟系统</span>
  </div>

  <div class="cluster-wrap">
    <!-- SVG 连线: 5条从节点圆心到中心圆心的线段 -->
    <svg viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg">
      <line x1="258" y1="57" x2="310" y2="188" stroke="#004a88" stroke-width="1.5" opacity="0.5" />
      <line x1="197" y1="176" x2="280" y2="190" stroke="#004a88" stroke-width="1.5" opacity="0.5" />
      <line x1="200" y1="346" x2="280" y2="210" stroke="#004a88" stroke-width="1.5" opacity="0.5" />
      <line x1="372" y1="346" x2="340" y2="210" stroke="#004a88" stroke-width="1.5" opacity="0.5" />
      <line x1="375" y1="176" x2="340" y2="190" stroke="#004a88" stroke-width="1.5" opacity="0.5" />
    </svg>

    <div class="cluster">
      <!-- 中心大圆 -->
      <div class="center-circle">
        <span class="circle-title">物流行业<br/>全认知</span>
        <span class="circle-hours">200课时</span>
      </div>

      <!-- node-1: 顶部 -->
      <div class="node node-1">
        <div class="node-circle"></div>
        <div class="node-label">模拟操作TMS/WMS系统，理解数据流转逻辑</div>
      </div>

      <!-- node-2: 左上 -->
      <div class="node node-2">
        <div class="node-circle"></div>
        <div class="node-label">梳理典型物流企业的组织架构与部门协作流程</div>
      </div>

      <!-- node-3: 左下 -->
      <div class="node node-3">
        <div class="node-circle"></div>
        <div class="node-label">从流程与系统角度，提出业务优化建议</div>
      </div>

      <!-- node-4: 右下 -->
      <div class="node node-4">
        <div class="node-circle"></div>
        <div class="node-label">图解快递、快运等主流模式的核心流程与痛点</div>
      </div>

      <!-- node-5: 右上 -->
      <div class="node node-5">
        <div class="node-circle"></div>
        <div class="node-label">学习物联网、AI等智慧物流技术应用案例</div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
