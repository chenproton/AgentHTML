        <div class="module-feature-header">
          <div class="module-feature-dot"></div>
          <span class="module-feature-title">岗位实景特色</span>
        </div>
        <div class="module-feature-desc">${data.desc}</div>
      </div>
      <div class="module-title ${t}"><span>${data.title}</span></div>
      <div class="module-tools">
        <div class="module-tools-dots" style="color:${dc};position:relative;display:flex;justify-content:space-between">
          <span style="border:4px solid ${dc};border-radius:50%;width:30px;height:30px;flex-shrink:0"></span>
          <span style="border:4px solid ${dc};border-radius:50%;width:30px;height:30px;flex-shrink:0"></span>
          <span style="position:absolute;left:20px;top:13px;width:462px;height:4px;background:${bc};border:none;border-radius:0"></span>
        </div>
        ${toolsHTML}
      </div>
      <div class="module-train-badge ${bg}"><span>训练工具</span></div>
    </div>
  `;
}

function renderAll() {
  const container = document.getElementById('moduleContainer');
  const btn = document.getElementById('addBtn');
  let html = '';

  // first 2 modules in top row
  for (let i = 0; i < Math.min(shown, 2); i++) {
    html += renderModule(MODULE_DATA[i], i);
  }
  let result = '<div class="top-row">' + html + '</div>';

  // 3-8 modules in grid
  if (shown > 2) {
    let gridHTML = '';
    for (let i = 2; i < shown; i++) {
      gridHTML += renderModule(MODULE_DATA[i], i);
    }
    result += '<div class="module-grid">' + gridHTML + '</div>';
  }

  container.innerHTML = result;

  if (shown >= MAX) {
    btn.classList.add('disabled');
  } else {
    btn.classList.remove('disabled');
  }
}

function addModule() {
  if (shown >= MAX) return;
  shown++;
  renderAll();
}

renderAll();
</script>
</body>
</html>
