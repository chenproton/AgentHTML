<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>智慧物流工程师</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: "Microsoft YaHei UI", "PingFang SC", "Helvetica Neue", Helvetica, Arial, sans-serif;
  background: #f0f2f5;
  min-height: 100vh;
  display: flex; justify-content: center; align-items: center;
  padding: 30px;
}

.module-card {
  max-width: 960px;
  background: #fff;
  border: 1px solid #004a88;
  border-radius: 40px;
  padding: 36px 44px;
}

.top-bar {
  display: flex; align-items: center; gap: 20px;
  margin-bottom: 16px; flex-wrap: wrap;
}
.top-badge {
  background: #f96217; color: #fff; border-radius: 100px;
  padding: 7px 22px; font-size: 22px; font-weight: 700;
}
.top-info {
  font-size: 13px; color: #666;
}

/*
  集群: 860×400。圆心=(430,200)
  中心圆=160px, 5节点R=155, 均匀分布 72° 间隔
*/
.cluster {
  position: relative;
  width: 860px; height: 400px;
  margin: 0 auto;
}

.center-circle {
  position: absolute;
  left: 430px; top: 200px;
  transform: translate(-50%, -50%);
  width: 160px; height: 160px;
  border-radius: 50%;
  background: rgba(194, 227, 255, 0.85);
  border: 3px solid #004a88;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 10;
}
.center-circle .circle-title {
  font-size: 19px; font-weight: 700; color: #004a88;
  text-align: center; line-height: 1.35;
}
.center-circle .circle-hours {
  font-size: 13px; font-weight: 600; color: #004a88;
  margin-top: 6px;
  background: #fff; border-radius: 50px; padding: 3px 16px;
}

/* 节点 */
.node {
  position: absolute;
  display: flex; align-items: center;
}
.node-circle {
  width: 48px; height: 48px;
  border-radius: 50%;
  background: rgba(194, 227, 255, 0.65);
  border: 2px solid #004a88;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.node-circle::after {
  content: '';
  width: 15px; height: 15px;
  border-radius: 50%;
  background: #004a88;
}

.node-label {
  background: #fff;
  border-radius: 0 12px 0 12px;
  box-shadow: 0 0 4px rgba(0,0,0,0.08);
  padding: 6px 14px;
  font-size: 12px; line-height: 1.5; color: #3a475b;
  max-width: 220px;
  position: absolute; top: 50%; transform: translateY(-50%);
}

/*
  五边形分布 R=155, 圆心(430,200):
  P1=0°:   (430+0,    200-155)   = (430, 45)   → node:(406, 21)
  P2=72°:  (430+147.4,200-47.9)  = (577.4,152.1)→ node:(553.4,128.1)
  P3=144°: (430+91.1, 200+125.4) = (521.1,325.4)→ node:(497.1,301.4)
  P4=216°: (430-91.1, 200+125.4) = (338.9,325.4)→ node:(314.9,301.4)
  P5=288°: (430-147.4,200-47.9)  = (282.6,152.1)→ node:(258.6,128.1)

  检查间隙(中心圆半径80):
  P1距中心: (430,45) 距中心200 = 155 ✓ (gap=155-80-24=51)
  P2距中心: √((577.4-430)²+(152.1-200)²)=√(147.4²+47.9²)=√(21727+2294)=√24021=155 ✓
  P3距中心: √(91.1²+125.4²)=√(8299+15725)=√24024=155 ✓
*/

.node-1 { left: 406px; top: 21px; flex-direction: column; }
.node-1 .node-label {
  top: auto; bottom: 100%; left: 50%; transform: translateX(-50%);
  margin-bottom: 6px;
  border-radius: 12px 12px 0 12px;
}

.node-2 { left: 259px; top: 128px; flex-direction: row-reverse; }
.node-2 .node-label {
  right: 100%; margin-right: 6px;
  border-radius: 12px 0 12px 12px;
}

.node-3 { left: 315px; top: 301px; flex-direction: row-reverse; }
.node-3 .node-label {
  right: 100%; margin-right: 6px;
  border-radius: 12px 0 12px 12px;
}

.node-4 { left: 497px; top: 301px; }
.node-4 .node-label {
  left: 100%; margin-left: 6px;
}

.node-5 { left: 553px; top: 128px; }
.node-5 .node-label {
  left: 100%; margin-left: 6px;
}

/* SVG 连线 */
.cluster svg {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%; z-index: 1;
  pointer-events: none;
}
</style>
</head>
<body>

<div class="module-card">
  <div class="top-bar">
    <span class="top-badge">智慧物流工程师</span>
    <span class="top-info">产业驱动式场景化智慧物流人才培养 &nbsp;|&nbsp; 1000课时 &nbsp;|&nbsp; WMS/TMS模拟系统</span>
  </div>

  <div class="cluster">
    <svg viewBox="0 0 860 400" xmlns="http://www.w3.org/2000/svg">
      <line x1="430" y1="45"   x2="410" y2="190" stroke="#004a88" stroke-width="1.5" opacity="0.35" />
      <line x1="283" y1="152" x2="330" y2="195" stroke="#004a88" stroke-width="1.5" opacity="0.35" />
      <line x1="339" y1="325" x2="360" y2="215" stroke="#004a88" stroke-width="1.5" opacity="0.35" />
      <line x1="521" y1="325" x2="500" y2="215" stroke="#004a88" stroke-width="1.5" opacity="0.35" />
      <line x1="577" y1="152" x2="530" y2="195" stroke="#004a88" stroke-width="1.5" opacity="0.35" />
    </svg>

    <!-- 中心大圆 -->
    <div class="center-circle">
      <span class="circle-title">物流行业<br/>全认知</span>
      <span class="circle-hours">200课时</span>
    </div>

    <!-- 1. 顶部 -->
    <div class="node node-1">
      <div class="node-circle"></div>
      <div class="node-label">模拟操作TMS/WMS系统，理解数据流转逻辑</div>
    </div>

    <!-- 2. 左上 — 标签向左 -->
    <div class="node node-2">
      <div class="node-circle"></div>
      <div class="node-label">梳理典型物流企业的组织架构与部门协作流程</div>
    </div>

    <!-- 3. 左下 — 标签向左 -->
    <div class="node node-3">
      <div class="node-circle"></div>
      <div class="node-label">从流程与系统角度，提出业务优化建议</div>
    </div>

    <!-- 4. 右下 — 标签向右 -->
    <div class="node node-4">
      <div class="node-circle"></div>
      <div class="node-label">图解快递、快运等主流模式的核心流程与痛点</div>
    </div>

    <!-- 5. 右上 — 标签向右 -->
    <div class="node node-5">
      <div class="node-circle"></div>
      <div class="node-label">学习物联网、AI等智慧物流技术应用案例</div>
    </div>
  </div>
</div>

</body>
</html>
