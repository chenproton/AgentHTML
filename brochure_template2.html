<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>智慧物流工程师</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: "Microsoft YaHei UI", "PingFang SC", "Helvetica Neue", Helvetica, Arial, sans-serif;
  background: #f0f2f5;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 40px;
}

/* ====== 容器 ====== */
.module-card {
  max-width: 1100px;
  width: 100%;
  background: #fff;
  border: 1px solid #004a88;
  border-radius: 50px;
  padding: 50px 60px;
  position: relative;
}

/* ====== 顶部信息栏 ====== */
.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 30px;
  flex-wrap: wrap;
  gap: 16px;
}
.top-badge {
  background: #f96217;
  color: #fff;
  border-radius: 100px;
  padding: 10px 28px;
  font-size: 28px;
  font-weight: 700;
}
.top-title {
  font-size: 20px;
  font-weight: 700;
  color: #004a88;
}
.top-subtitle {
  font-size: 14px;
  color: #666;
}

/* ====== 中心圆形集群 ====== */
.cluster {
  position: relative;
  width: 100%;
  aspect-ratio: 1.3;
  min-height: 600px;
}

/* 中心大圆 */
.center-circle {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 200px;
  height: 200px;
  border-radius: 50%;
  background: rgba(194, 227, 255, 0.8);
  border: 3px solid #004a88;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 10;
}
.center-circle .circle-title {
  font-size: 22px;
  font-weight: 700;
  color: #004a88;
  text-align: center;
  line-height: 1.4;
}
.center-circle .circle-hours {
  font-size: 16px;
  font-weight: 600;
  color: #004a88;
  margin-top: 8px;
  background: #fff;
  border-radius: 50px;
  padding: 4px 20px;
}

/* 小圆节点组 */
.node {
  position: absolute;
  display: flex;
  align-items: center;
  gap: 12px;
}
/* 小圆 */
.node-circle {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: rgba(194, 227, 255, 0.6);
  border: 2px solid #004a88;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  z-index: 5;
}
.node-circle .node-icon {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: #004a88;
}

/* 小圆的标签白块 */
.node-label {
  background: #fff;
  border-radius: 0 14px 0 14px;
  box-shadow: 0 0 4px rgba(0,0,0,0.1);
  padding: 10px 18px;
  font-size: 14px;
  color: #3a475b;
  line-height: 1.5;
  white-space: nowrap;
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  z-index: 4;
}

/* === 5 个节点位置 === */
/* 节点1: 顶部 */
.node-1 { top: 2%; left: 50%; transform: translateX(-50%); flex-direction: column; }
.node-1 .node-label {
  top: auto; bottom: 100%; left: 50%; transform: translateX(-50%);
  margin-bottom: 8px;
  border-radius: 14px 14px 0 14px;
}

/* 节点2: 左上 */
.node-2 { top: 15%; left: 8%; }
.node-2 .node-label {
  left: 100%; margin-left: 8px;
}

/* 节点3: 左下 */
.node-3 { bottom: 12%; left: 15%; }
.node-3 .node-label {
  left: 100%; margin-left: 8px;
}

/* 节点4: 右下 */
.node-4 { bottom: 12%; right: 15%; flex-direction: row-reverse; }
.node-4 .node-label {
  right: 100%; margin-right: 8px;
  border-radius: 14px 0 14px 14px;
}

/* 节点5: 右上 */
.node-5 { top: 15%; right: 8%; flex-direction: row-reverse; }
.node-5 .node-label {
  right: 100%; margin-right: 8px;
  border-radius: 14px 0 14px 14px;
}

/* ====== 连接线 ====== */
.node::before {
  content: '';
  position: absolute;
  background: #004a88;
  z-index: 1;
}

/* 顶部连接线 */
.node-1::before {
  width: 2px;
  height: 30px;
  bottom: 100%;
  left: 50%;
  transform: translateX(-50%);
}

/* 左上连接线 */
.node-2::before {
  width: 50px;
  height: 2px;
  right: 95%;
  top: 50%;
}
.node-2::after {
  content: '';
  position: absolute;
  width: 2px;
  height: 30px;
  bottom: 100%;
  right: calc(95% + 50px - 1px);
  background: #004a88;
  z-index: 1;
}

/* 左下连接线 */
.node-3::before {
  width: 40px;
  height: 2px;
  right: 95%;
  top: 50%;
}
.node-3::after {
  content: '';
  position: absolute;
  width: 2px;
  height: 25px;
  top: 100%;
  right: calc(95% + 40px - 1px);
  background: #004a88;
  z-index: 1;
}

/* 右下连接线 */
.node-4::before {
  width: 40px;
  height: 2px;
  left: 95%;
  top: 50%;
}
.node-4::after {
  content: '';
  position: absolute;
  width: 2px;
  height: 25px;
  top: 100%;
  left: calc(95% + 40px - 1px);
  background: #004a88;
  z-index: 1;
}

/* 右上连接线 */
.node-5::before {
  width: 50px;
  height: 2px;
  left: 95%;
  top: 50%;
}
.node-5::after {
  content: '';
  position: absolute;
  width: 2px;
  height: 30px;
  bottom: 100%;
  left: calc(95% + 50px - 1px);
  background: #004a88;
  z-index: 1;
}
</style>
</head>
<body>

<div class="module-card">
  <!-- 顶部信息栏 -->
  <div class="top-bar">
    <span class="top-badge">智慧物流工程师</span>
    <span class="top-title">产业驱动式场景化智慧物流人才培养</span>
    <span class="top-subtitle">1000课时 | WMS/TMS模拟系统</span>
  </div>

  <!-- 中心圆形集群 -->
  <div class="cluster">

    <!-- 中心大圆 -->
    <div class="center-circle">
      <span class="circle-title">物流行业<br/>全认知</span>
      <span class="circle-hours">200课时</span>
    </div>

    <!-- 节点1: 顶部 -->
    <div class="node node-1">
      <div class="node-circle"><div class="node-icon"></div></div>
      <div class="node-label">模拟操作TMS/WMS系统，理解数据流转逻辑</div>
    </div>

    <!-- 节点2: 左上 -->
    <div class="node node-2">
      <div class="node-circle"><div class="node-icon"></div></div>
      <div class="node-label">梳理典型物流企业的组织架构与部门协作流程</div>
    </div>

    <!-- 节点3: 左下 -->
    <div class="node node-3">
      <div class="node-circle"><div class="node-icon"></div></div>
      <div class="node-label">从流程与系统角度，提出业务优化建议</div>
    </div>

    <!-- 节点4: 右下 -->
    <div class="node node-4">
      <div class="node-circle"><div class="node-icon"></div></div>
      <div class="node-label">图解快递、快运等主流模式的核心流程与痛点</div>
    </div>

    <!-- 节点5: 右上 -->
    <div class="node node-5">
      <div class="node-circle"><div class="node-icon"></div></div>
      <div class="node-label">学习物联网、AI等智慧物流技术应用案例</div>
    </div>

  </div>
</div>

</body>
</html>
