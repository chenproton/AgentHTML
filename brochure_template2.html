<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>智慧物流工程师</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: "Microsoft YaHei UI", "PingFang SC", "Helvetica Neue", Helvetica, Arial, sans-serif;
  background: #f0f2f5;
  min-height: 100vh;
  display: flex; justify-content: center; align-items: center;
  padding: 30px;
}

.module-card {
  background: #fff;
  border: 1px solid #004a88;
  border-radius: 40px;
  padding: 40px 30px;
}

/*
  集群: 1100×440。圆心=(550,220)
  中心圆=160px, 5节点R=160
  间距=160-80(中心半径)-24(节点半径)=56px
*/
.cluster {
  position: relative;
  width: 1100px; height: 440px;
}

.center-circle {
  position: absolute;
  left: 550px; top: 220px;
  transform: translate(-50%, -50%);
  width: 160px; height: 160px;
  border-radius: 50%;
  background: rgba(194, 227, 255, 0.85);
  border: 3px solid #004a88;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 10;
}
.center-circle .circle-title {
  font-size: 18px; font-weight: 700; color: #004a88;
  text-align: center; line-height: 1.35;
}
.center-circle .circle-hours {
  font-size: 13px; font-weight: 600; color: #004a88;
  margin-top: 6px;
  background: #fff; border-radius: 50px; padding: 3px 16px;
}

/* 节点 */
.node {
  position: absolute;
  display: flex; align-items: center;
}
.node-circle {
  width: 48px; height: 48px;
  border-radius: 50%;
  background: rgba(194, 227, 255, 0.65);
  border: 2px solid #004a88;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.node-circle::after {
  content: '';
  width: 15px; height: 15px;
  border-radius: 50%;
  background: #004a88;
}

.node-label {
  background: #fff;
  border-radius: 0 12px 0 12px;
  box-shadow: 0 0 4px rgba(0,0,0,0.08);
  padding: 7px 16px;
  font-size: 13px; line-height: 1.5; color: #3a475b;
  white-space: nowrap;
  position: absolute; top: 50%; transform: translateY(-50%);
}

/*
  五边形 R=160, 圆心(550,220):
  P1=0°:   (550+0,    220-160)    = (550, 60)    → node:(526, 36)
  P2=72°:  (550+152.2, 220-49.4)  = (702.2, 170.6) → node:(678, 147)
  P3=144°: (550+94.0,  220+129.4) = (644, 349.4)   → node:(620, 325)
  P4=216°: (550-94.0,  220+129.4) = (456, 349.4)   → node:(432, 325)
  P5=288°: (550-152.2, 220-49.4)  = (397.8, 170.6) → node:(374, 147)
*/

.node-1 { left: 526px; top: 36px; flex-direction: column; }
.node-1 .node-label {
  top: auto; bottom: 100%; left: 50%; transform: translateX(-50%);
  margin-bottom: 6px;
  border-radius: 12px 12px 0 12px;
}

.node-2 { left: 374px; top: 147px; flex-direction: row-reverse; }
.node-2 .node-label {
  right: 100%; margin-right: 6px;
  border-radius: 12px 0 12px 12px;
}

.node-3 { left: 432px; top: 325px; flex-direction: row-reverse; }
.node-3 .node-label {
  right: 100%; margin-right: 6px;
  border-radius: 12px 0 12px 12px;
}

.node-4 { left: 620px; top: 325px; }
.node-4 .node-label {
  left: 100%; margin-left: 6px;
}

.node-5 { left: 678px; top: 147px; }
.node-5 .node-label {
  left: 100%; margin-left: 6px;
}

/* SVG 连线 */
.cluster svg {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%; z-index: 1;
  pointer-events: none;
}
</style>
</head>
<body>

<div class="module-card">
  <div class="cluster">
    <svg viewBox="0 0 1100 440" xmlns="http://www.w3.org/2000/svg">
      <line x1="550" y1="60"   x2="520" y2="200" stroke="#004a88" stroke-width="1.5" opacity="0.35" />
      <line x1="398" y1="171" x2="460" y2="208" stroke="#004a88" stroke-width="1.5" opacity="0.35" />
      <line x1="456" y1="349" x2="480" y2="228" stroke="#004a88" stroke-width="1.5" opacity="0.35" />
      <line x1="644" y1="349" x2="620" y2="228" stroke="#004a88" stroke-width="1.5" opacity="0.35" />
      <line x1="702" y1="171" x2="640" y2="208" stroke="#004a88" stroke-width="1.5" opacity="0.35" />
    </svg>

    <div class="center-circle">
      <span class="circle-title">物流行业<br/>全认知</span>
      <span class="circle-hours">200课时</span>
    </div>

    <div class="node node-1">
      <div class="node-circle"></div>
      <div class="node-label">模拟操作TMS/WMS系统，理解数据流转逻辑</div>
    </div>

    <div class="node node-2">
      <div class="node-circle"></div>
      <div class="node-label">梳理典型物流企业的组织架构与部门协作流程</div>
    </div>

    <div class="node node-3">
      <div class="node-circle"></div>
      <div class="node-label">从流程与系统角度，提出业务优化建议</div>
    </div>

    <div class="node node-4">
      <div class="node-circle"></div>
      <div class="node-label">图解快递、快运等主流模式的核心流程与痛点</div>
    </div>

    <div class="node node-5">
      <div class="node-circle"></div>
      <div class="node-label">学习物联网、AI等智慧物流技术应用案例</div>
    </div>
  </div>
</div>

</body>
</html>
