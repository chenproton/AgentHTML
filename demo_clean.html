  const POINT_POS = ['tl', 'tr', 'bl', 'br'];
  const STORAGE_KEY = 'jobPathData';

  function uid() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  function loadData() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        if (parsed && Array.isArray(parsed.jobs)) return parsed;
      }
    } catch (e) {}
    return JSON.parse(JSON.stringify(DEFAULT_DATA));
  }

  function saveData(data) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  function getTextWithoutButtons(el) {
    // collect text nodes, skipping buttons
    const texts = [];
    el.childNodes.forEach(function (node) {
      if (node.nodeType === Node.TEXT_NODE) {
        texts.push(node.textContent);
      } else if (node.nodeType === Node.ELEMENT_NODE && node.tagName.toLowerCase() !== 'button') {
        texts.push(node.textContent);
      }
    });
    return texts.join('').trim();
  }

  function render() {
    const data = window.__currentData;
    const panel = document.querySelector('.cards-panel');
    panel.innerHTML = '';

    // Global toolbar
    const toolbar = document.createElement('div');
    toolbar.className = 'edit-toolbar';
    if (data.jobs.length < 8) {
      const addJob = document.createElement('button');
      addJob.className = 'edit-btn edit-btn--primary';
      addJob.textContent = '新增岗位';
      addJob.onclick = handleAddJob;
      toolbar.appendChild(addJob);
    }
    const resetBtn = document.createElement('button');
    resetBtn.className = 'edit-btn';
    resetBtn.textContent = '恢复默认';
    resetBtn.onclick = function () {
      if (confirm('确定恢复默认数据？当前编辑内容将丢失。')) {
        localStorage.removeItem(STORAGE_KEY);
        window.__currentData = JSON.parse(JSON.stringify(DEFAULT_DATA));
        render();
      }
    };
    toolbar.appendChild(resetBtn);
    panel.appendChild(toolbar);

    function buildCard(job, jobIndex) {
      const article = document.createElement('article');
      article.className = 'job-card' + (job.color === 'orange' ? ' job-card--orange' : '');

      // Feature block
      const feature = document.createElement('div');
      feature.className = 'job-card__feature';
      feature.innerHTML = '<div class="feature-label">' +
        '<span class="feature-label__dot"></span>' +
        '<h3 class="feature-label__text">' + escapeHtml(job.featureTitle) + '</h3>' +
        '</div>' +
        '<p class="job-card__desc" contenteditable="true" data-field="desc" data-job-id="' + job.id + '">' + escapeHtml(job.featureDesc) + '</p>';
      article.appendChild(feature);

      // Title
      const title = document.createElement('h2');
      title.className = 'job-card__title';
      title.contentEditable = true;
      title.dataset.field = 'title';
      title.dataset.jobId = job.id;
      title.textContent = job.title;
      article.appendChild(title);

      // Tools
      const toolsDiv = document.createElement('div');
      toolsDiv.className = 'job-card__tools';
      const dots = '<div class="tools-dots">' +
        '<span class="tools-dots__dot"></span>' +
        '<span class="tools-dots__dot"></span>' +
        '<span class="tools-dots__line"></span>' +
        '</div>';
      const toolsList = document.createElement('ul');
      toolsList.className = 'tools-list';
      job.tools.forEach(function (tool, ti) {
        const li = document.createElement('li');
        li.className = 'tools-list__item';
        li.contentEditable = true;
        li.dataset.field = 'tool';
        li.dataset.jobId = job.id;
        li.dataset.toolIndex = ti;
        li.textContent = tool;
        toolsList.appendChild(li);
      });
      toolsDiv.innerHTML = dots;
      toolsDiv.appendChild(toolsList);
      article.appendChild(toolsDiv);

      // Badge
      const badge = document.createElement('span');
      badge.className = 'job-card__tools-badge';
      badge.textContent = '训练工具';
      article.appendChild(badge);

      // Card actions
      const actions = document.createElement('div');
      actions.className = 'job-card__actions';
      if (data.jobs.length > 1) {
        const delJob = document.createElement('button');
        delJob.className = 'edit-btn edit-btn--danger edit-btn--small';
        delJob.textContent = '删除岗位';
        delJob.onclick = function () {
          data.jobs.splice(jobIndex, 1);
          saveData(data);
          render();
        };
        actions.appendChild(delJob);
      }
      if (job.units.length < 7) {
        const addUnit = document.createElement('button');
        addUnit.className = 'edit-btn edit-btn--primary edit-btn--small';
        addUnit.textContent = '新增单元';
        addUnit.onclick = function () { handleAddUnit(job); };
        actions.appendChild(addUnit);
      }
      article.appendChild(actions);

      // Timeline
      const timeline = document.createElement('div');
      timeline.className = 'job-card__timeline';
      timeline.innerHTML = '<svg class="timeline__connections" width="3600" height="1040" viewBox="0 0 3600 1040" preserveAspectRatio="none" aria-hidden="true">' +
        '<path d="M257,780 L771,260 L1286,780 L1800,260 L2314,780 L2829,260 L3343,780" />' +
        '</svg>';

      const row1 = job.units.slice(0, 3);
      const row2 = job.units.slice(3);
      [row1, row2].forEach(function (rowUnits, ri) {
        if (!rowUnits.length) return;
        const rowDiv = document.createElement('div');
        rowDiv.className = 'timeline__row';
        rowUnits.forEach(function (unit, uiInRow) {
          const unitIndex = ri === 0 ? uiInRow : 3 + uiInRow;
          const unitEl = document.createElement('div');
          unitEl.className = 'timeline-unit';

          // Node
          const node = document.createElement('div');
          node.className = 'timeline-unit__node';
          node.contentEditable = true;
          node.dataset.field = 'unit-title';
          node.dataset.jobId = job.id;
          node.dataset.unitIndex = unitIndex;
          node.innerHTML = unit.title;
          unitEl.appendChild(node);

          // Capsule
          const cap = document.createElement('span');
          cap.className = 'timeline-unit__capsule';
          cap.contentEditable = true;
          cap.dataset.field = 'unit-hours';
          cap.dataset.jobId = job.id;
          cap.dataset.unitIndex = unitIndex;
          cap.textContent = unit.hours + '课时';
          unitEl.appendChild(cap);

          // Points
          unit.points.forEach(function (pointText, pi) {
            const posClass = 'timeline-unit__point--' + POINT_POS[pi % POINT_POS.length];
            const point = document.createElement('span');
            point.className = 'timeline-unit__point ' + posClass;
            point.contentEditable = true;
            point.dataset.field = 'point';
            point.dataset.jobId = job.id;
            point.dataset.unitIndex = unitIndex;
            point.dataset.pointIndex = pi;
            point.textContent = pointText;
            if (unit.points.length > 1) {
              const delPoint = document.createElement('button');
              delPoint.className = 'point-del';
              delPoint.textContent = '×';
              delPoint.title = '删除知识点';
              delPoint.contentEditable = 'false';
              delPoint.onclick = function (e) {
                e.stopPropagation();
                unit.points.splice(pi, 1);
                saveData(data);
                render();
              };
              point.appendChild(delPoint);
            }
            unitEl.appendChild(point);
          });

          // Unit actions
          const unitActions = document.createElement('div');
          unitActions.className = 'unit-actions';
          if (job.units.length > 1) {
            const delUnit = document.createElement('button');
            delUnit.className = 'edit-btn edit-btn--danger edit-btn--tiny';
            delUnit.textContent = '删除单元';
            delUnit.onclick = function () {
              job.units.splice(unitIndex, 1);
              saveData(data);
              render();
            };
            unitActions.appendChild(delUnit);
          }
          if (unit.points.length < 4) {
            const addPoint = document.createElement('button');
            addPoint.className = 'edit-btn edit-btn--primary edit-btn--tiny';
            addPoint.textContent = '新增知识点';
            addPoint.onclick = function () { handleAddPoint(job, unit); };
            unitActions.appendChild(addPoint);
          }
          unitEl.appendChild(unitActions);

          rowDiv.appendChild(unitEl);
        });
        timeline.appendChild(rowDiv);
      });
      article.appendChild(timeline);

      return article;
    }

    const rowCount = Math.min(2, data.jobs.length);
    if (rowCount > 0) {
      const rowDiv = document.createElement('div');
      rowDiv.className = 'cards-row';
      for (let i = 0; i < rowCount; i++) {
        rowDiv.appendChild(buildCard(data.jobs[i], i));
      }
      panel.appendChild(rowDiv);
    }
    if (data.jobs.length > 2) {
      const gridDiv = document.createElement('div');
      gridDiv.className = 'cards-grid';
      for (let i = 2; i < data.jobs.length; i++) {
        gridDiv.appendChild(buildCard(data.jobs[i], i));
      }
      panel.appendChild(gridDiv);
    }

    bindBlur();
  }

  function bindBlur() {
    document.querySelectorAll('[contenteditable="true"]').forEach(function (el) {
      el.onblur = handleBlur;
    });
  }

  function handleBlur(e) {
    const el = e.target;
    const field = el.dataset.field;
    const jobId = el.dataset.jobId;
    const data = window.__currentData;
    const job = data.jobs.find(function (j) { return j.id === jobId; });
    if (!job) return;

    if (field === 'desc') {
      job.featureDesc = el.innerText.trim();
    } else if (field === 'title') {
      job.title = el.innerText.trim();
      const m = job.title.match(/（(\d+)课时）/);
      if (m) job.hours = parseInt(m[1], 10);
    } else if (field === 'tool') {
      const ti = parseInt(el.dataset.toolIndex, 10);
      if (job.tools[ti] !== undefined) job.tools[ti] = el.innerText.trim();
    } else if (field === 'unit-title') {
      const ui = parseInt(el.dataset.unitIndex, 10);
      if (job.units[ui]) job.units[ui].title = el.innerHTML.trim();
    } else if (field === 'unit-hours') {
      const ui = parseInt(el.dataset.unitIndex, 10);
      const num = parseInt(el.innerText.replace(/[^\d]/g, ''), 10) || 0;
      if (job.units[ui]) job.units[ui].hours = num;
      el.textContent = num + '课时';
    } else if (field === 'point') {
      const ui = parseInt(el.dataset.unitIndex, 10);
      const pi = parseInt(el.dataset.pointIndex, 10);
      if (job.units[ui] && job.units[ui].points[pi] !== undefined) {
        job.units[ui].points[pi] = getTextWithoutButtons(el);
      }
    }
    saveData(data);
  }

  function handleAddJob() {
    const data = window.__currentData;
    if (data.jobs.length >= 8) return;
    const name = prompt('岗位名称（示例：新岗位（100课时））：');
    if (!name) return;
    const hours = parseInt(prompt('总课时：', '100'), 10) || 100;
    let color = prompt('主色（blue 或 orange）：', 'blue');
    if (color !== 'blue' && color !== 'orange') color = 'blue';
    const featureDesc = prompt('岗位实景描述：', '') || '';
    const toolsRaw = prompt('训练工具（逗号分隔）：', '') || '';
    const tools = toolsRaw.split(/[,，]/).map(function (s) { return s.trim(); }).filter(Boolean);
    if (!tools.length) tools.push('训练工具示例');
    data.jobs.push({
      id: 'job_' + uid(),
      title: name,
      hours: hours,
      color: color,
      featureTitle: '岗位实景特色',
      featureDesc: featureDesc,
      tools: tools,
      units: [{ id: 'unit_' + uid(), title: '新单元', hours: hours, points: ['知识点1'] }]
    });
    saveData(data);
    render();
  }

  function handleAddUnit(job) {
    if (job.units.length >= 7) return;
    const name = prompt('单元名称（可用 <br> 换行）：', '新单元');
    if (name === null) return;
    const hours = parseInt(prompt('课时：', '100'), 10) || 100;
    job.units.push({
      id: 'unit_' + uid(),
      title: name || '新单元',
      hours: hours,
      points: ['知识点1']
    });
    saveData(window.__currentData);
    render();
  }

  function handleAddPoint(job, unit) {
    if (unit.points.length >= 4) return;
    const text = prompt('知识点文本：', '');
    if (text === null) return;
    unit.points.push(text || '新知识点');
    saveData(window.__currentData);
    render();
  }

  window.__currentData = loadData();
  render();
})();
</script>
